<!DOCTYPE html>
<html lang="ca">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="assets/upf.png">
	<title>PisCompany</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/auth.css">

	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

	<script>
		window.App = window.App || {};
		App.Errors = App.Errors || {};
		App.currentLang = "ca";
	</script>
	<script src="js/LoginValidation.js"></script>
	<script src="js/RegisterValidation.js"></script>

	<script>
		App.init = function () {
			$.ajaxSetup({ cache: false });
			$('#navigation').load("Menu", function () { lucide.createIcons(); });
			$('#content').load("Content", function () { lucide.createIcons(); });
			App.bindEvents();
			App.applyAccessibility();
		};

		App.setLayout = function (type) {
			var wrapper = $('#page-wrapper');
			if (type === 'simple') {
				wrapper.addClass('layout-simple');
			} else {
				wrapper.removeClass('layout-simple');
			}
			lucide.createIcons();
		};

		App.icons = function () { lucide.createIcons(); };

		App.bindEvents = function () {
			/* Menu navigation */
			$(document).on("click", ".menu", function (event) {
				event.preventDefault();
				$('#content').load($(this).attr('href'), function () { lucide.createIcons(); });
				App.stack();
			});

			/* Form submission via AJAX */
			$(document).on("submit", "form", function (event) {
				if (event.isDefaultPrevented() || !this.checkValidity()) return;
				event.preventDefault();
				var form = this;
				var url = $(form).attr('action');
				var hasFiles = $(form).find('input[type="file"]').length > 0;
				if (hasFiles) {
					$.ajax({
						type: 'POST', url: url,
						data: new FormData(form),
						processData: false, contentType: false
					}).done(function (html) {
						$('#navigation').load("Menu", function () { lucide.createIcons(); });
						$("#content").empty().append($.parseHTML(html, document, true));
						lucide.createIcons();
					});
				} else {
					var formObj = {};
					$(form).serializeArray().forEach(function (f) { formObj[f.name] = f.value; });
					$("#content").load(url, formObj, function () {
						$('#navigation').load("Menu", function () { lucide.createIcons(); });
						lucide.createIcons();
					});
				}
			});

			/* Follow user */
			$(document).on("click", ".followUser", function (event) {
				event.preventDefault();
				var id = $(this).closest('[id]').attr("id");
				$.post("Follow", { id: id }, function () {
					$('#rcolumn').load($('#rcolumn').data('load') || 'HomeRight', function () { lucide.createIcons(); });
				});
			});

			/* Unfollow user */
			$(document).on("click", ".unfollowUser", function (event) {
				event.preventDefault();
				var id = $(this).closest('[id]').attr("id");
				$.post("Unfollow", { id: id }, function () {
					$("#content").load("Followed", function () { lucide.createIcons(); });
					$('#rcolumn').load('HomeRight', function () { lucide.createIcons(); });
				});
			});

			/* Accept follow request */
			$(document).on("click", ".acceptRequest", function (event) {
				event.preventDefault();
				var from = $(this).closest('[id]').attr("id");
				$.post("AcceptFollow", { from: from }, function () {
					$('#rcolumn').load('HomeRight', function () { lucide.createIcons(); });
				});
			});

			/* Reject follow request */
			$(document).on("click", ".rejectRequest", function (event) {
				event.preventDefault();
				var from = $(this).closest('[id]').attr("id");
				$.post("RejectFollow", { from: from }, function () {
					$('#rcolumn').load('HomeRight', function () { lucide.createIcons(); });
				});
			});

			/* Add tweet (Publicar) */
			$(document).on("click", "#addTweet", function (event) {
				event.preventDefault();
				var textBody = $("#tweetBody").val().trim();
				if (!textBody) { alert("Cal escriure el contingut."); return; }
				var category = $("#tweetCategory").val() || "";
				var location = $("#tweetLocation").val().trim();
				var title = category || textBody.substring(0, 80);
				var fileInput = $("#tweetPicture")[0];
				var formData = new FormData();
				formData.append("title", title);
				formData.append("textBody", textBody);
				if (category) formData.append("category", category);
				if (location) formData.append("location", location);
				if (fileInput && fileInput.files.length > 0) {
					formData.append("picture", fileInput.files[0]);
				}
				var $btn = $(this);
				$btn.prop('disabled', true);
				$.ajax({
					type: "POST", url: "AddTweet",
					data: formData, processData: false, contentType: false,
					success: function () {
						$('#content').load("Timeline", function () { lucide.createIcons(); });
					},
					error: function () {
						$btn.prop('disabled', false);
						alert("Error en publicar. Torna-ho a intentar.");
					}
				});
			});

			/* Like tweet */
			$(document).on("click", ".likeTweet", function (event) {
				event.preventDefault();
				var id = $(this).closest('.tweet-card').attr('id');
				$.post("AddLike", { id: id }, function () {
					$("#iterator").load("Tweets", function () { lucide.createIcons(); });
				});
			});

			/* Unlike tweet */
			$(document).on("click", ".unlikeTweet", function (event) {
				event.preventDefault();
				var id = $(this).closest('.tweet-card').attr('id');
				$.post("DelLike", { id: id }, function () {
					$("#iterator").load("Tweets", function () { lucide.createIcons(); });
				});
			});

			/* Toggle comments */
			$(document).on("click", ".toggleComments", function (event) {
				event.preventDefault();
				var tweetId = $(this).closest('.tweet-card').attr('id');
				var section = $("#comments-" + tweetId);
				if (section.is(":hidden")) {
					section.show();
					if (section.find(".commentsList").is(":empty")) {
						section.find(".commentsList").load("Comments?id=" + tweetId, function () { lucide.createIcons(); });
					}
				} else {
					section.hide();
				}
			});

			/* Add comment */
			$(document).on("click", ".addComment", function (event) {
				event.preventDefault();
				var section = $(this).closest('[id^="comments-"]');
				var tweetId = section.attr("id").replace("comments-", "");
				var textBody = section.find(".commentBody").val().trim();
				var title = textBody.substring(0, 80) || "Comentari";
				if (!textBody) { alert("Cal escriure un comentari."); return; }
				$.post("AddTweet", { title: title, textBody: textBody, parentId: tweetId }, function () {
					section.find(".commentBody").val("");
					section.find(".commentsList").load("Comments?id=" + tweetId, function () {
						lucide.createIcons();
						section.closest('.tweet-card').find('.commentCount').text(section.find(".commentsList .comment-card").length);
					});
				});
			});

			/* Toggle reply */
			$(document).on("click", ".toggleReply", function (event) {
				event.preventDefault();
				$(this).closest(".comment-content").find(".replyForm").toggle();
			});

			/* Add reply */
			$(document).on("click", ".addReply", function (event) {
				event.preventDefault();
				var replyForm = $(this).closest(".replyForm");
				var parentId = replyForm.attr("data-parent");
				var rootTweetId = replyForm.attr("data-root");
				var textBody = replyForm.find(".replyBody").val().trim();
				var title = textBody.substring(0, 80) || "Resposta";
				if (!textBody) { alert("Cal escriure una resposta."); return; }
				$.post("AddTweet", { title: title, textBody: textBody, parentId: parentId }, function () {
					replyForm.find(".replyBody").val(""); replyForm.hide();
					var section = $("#comments-" + rootTweetId);
					section.find(".commentsList").load("Comments?id=" + rootTweetId, function () {
						lucide.createIcons();
						section.closest('.tweet-card').find('.commentCount').text(section.find(".commentsList .comment-card").length);
					});
				});
			});

			/* Delete comment */
			$(document).on("click", ".delComment", function (event) {
				event.preventDefault();
				var commentId = $(this).closest('.comment-card').attr('id');
				var section = $(this).closest('[id^="comments-"]');
				var tweetId = section.attr("id").replace("comments-", "");
				$.post("DelTweet", { id: commentId }, function () {
					section.find(".commentsList").load("Comments?id=" + tweetId, function () {
						lucide.createIcons();
						section.closest('.tweet-card').find('.commentCount').text(section.find(".commentsList .comment-card").length);
					});
				});
			});

			/* Delete tweet */
			$(document).on("click", ".delTweet", function (event) {
				event.preventDefault();
				var id = $(this).closest('.tweet-card').attr('id');
				$.post("DelTweet", { id: id }, function () {
					$("#iterator").load("Tweets", function () { lucide.createIcons(); });
				});
			});

			/* Category filter */
			$(document).on("click", ".pc-filter-btn", function () {
				$(".pc-filter-btn").removeClass("active");
				$(this).addClass("active");
				var cat = $(this).data("cat");
				loadTweets(cat);
			});

			/* Char counter for textarea */
			$(document).on("input", "#tweetBody", function () {
				$("#charCount").text($(this).val().length);
			});

			/* Accessibility: theme */
			$(document).on("click", "#toggleTheme", function () {
				$("body").toggleClass("dark-mode");
				var isDark = $("body").hasClass("dark-mode");
				localStorage.setItem("theme", isDark ? "dark" : "light");
				$("#toggleTheme, #toggleLight").toggleClass("active");
				lucide.createIcons();
			});
			$(document).on("click", "#toggleLight", function () {
				$("body").removeClass("dark-mode");
				localStorage.setItem("theme", "light");
				$("#toggleLight").addClass("active");
				$("#toggleTheme").removeClass("active");
			});

			/* Accessibility: font */
			$(document).on("click", ".font-toggle-btn", function () {
				var size = $(this).data("size");
				$("body").removeClass("font-small font-normal font-large").addClass("font-" + size);
				localStorage.setItem("fontSize", size);
				$(".font-toggle-btn").removeClass("active");
				$(this).addClass("active");
			});

			/* Accessibility: language */
			$(document).on("click", "#langCA", function () {
				localStorage.setItem("lang", "ca"); App.currentLang = "ca";
				App.applyLang("ca");
				$("#langCA").addClass("active"); $("#langEN").removeClass("active");
			});
			$(document).on("click", "#langEN", function () {
				localStorage.setItem("lang", "en"); App.currentLang = "en";
				App.applyLang("en");
				$("#langEN").addClass("active"); $("#langCA").removeClass("active");
			});
		};

		/* Load tweets filtered by category */
		function loadTweets(cat) {
			var url = cat ? "Tweets?category=" + encodeURIComponent(cat) : "Tweets";
			$("#iterator").load(url, function () { lucide.createIcons(); });
		}

		App.stack = function () { $("#pc-stack").toggleClass("pc-stack-open"); };

		App.applyLang = function (lang) {
			$("[data-ca][data-en]").each(function () {
				$(this).text($(this).attr("data-" + lang));
			});
		};

		App.applyAccessibility = function () {
			var theme = localStorage.getItem("theme") || "light";
			var fontSize = localStorage.getItem("fontSize") || "normal";
			App.currentLang = localStorage.getItem("lang") || "ca";
			$("body").toggleClass("dark-mode", theme === "dark");
			$("body").removeClass("font-small font-normal font-large").addClass("font-" + fontSize);
		};

		$(document).ready(function () {
			App.init();
		});
	</script>
</head>

<body>
	<div id="navigation"></div>

	<div id="page-wrapper">
		<div id="lcolumn"></div>
		<div id="content"></div>
		<div id="rcolumn"></div>
	</div>

	<footer class="pc-footer">
		<span>Sobre nosaltres · Ajuda · Condicions</span>
	</footer>
</body>

</html>
