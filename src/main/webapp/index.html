<!DOCTYPE html>
<html lang=en>

<head>
	<meta charset="UTF-8">
	<link rel="icon" href="assets/upf.png">
	<title> U </title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
	<link rel="stylesheet" href="https://www.w3schools.com/lib/w3-theme-blue.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="css/style.css">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script>
		window.App = window.App || {};
		App.Errors = App.Errors || {};
	</script>
	<script src="js/LoginValidation.js"></script>
	<script src="js/RegisterValidation.js"></script>

	<script>
		App.init = function () {
			$.ajaxSetup({ cache: false });
			$('#navigation').load("Menu");
			$('#content').load("Content");
			$('#lcolumn').load("Profile");
			$('#rcolumn').load("NotFollowed");
			App.bindEvents();
		};

		App.bindEvents = function () {
			/* Menu navigation */
			$(document).on("click", ".menu", function (event) {
				event.preventDefault();
				$('#content').load($(this).attr('href'));
				App.stack();
			});

			/* Form submission via AJAX — uses .load() for non-file forms so scripts execute */
			$(document).on("submit", "form", function (event) {
				if (event.isDefaultPrevented() || !this.checkValidity()) return;
				event.preventDefault();
				var form = this;
				var url = $(form).attr('action');
				var hasFiles = $(form).find('input[type="file"]').length > 0;

				if (hasFiles) {
					/* Multipart form (e.g. Register with picture upload) */
					$.ajax({
						type: 'POST',
						url: url,
						data: new FormData(form),
						processData: false,
						contentType: false
					}).done(function (html) {
						$('#navigation').load("Menu");
						$('#lcolumn').load("Profile");
						$('#rcolumn').load("NotFollowed");
						/* $.parseHTML amb keepScripts=true + append() executa els scripts del fragment */
						$("#content").empty().append($.parseHTML(html, document, true));
					});
				} else {
					/* Regular form: serialitzem com a objecte (no string!) perquè .load() enviï POST */
					var formObj = {};
					$(form).serializeArray().forEach(function(f) { formObj[f.name] = f.value; });
					$("#content").load(url, formObj, function () {
						$('#navigation').load("Menu");
						$('#lcolumn').load("Profile");
						$('#rcolumn').load("NotFollowed");
					});
				}
			});

			/* Follow user */
			$(document).on("click", ".followUser", function (event) {
				event.preventDefault();
				var id = $(this).parent().attr("id");
				$.post("Follow", { id: id }, function () {
					$("#content").load("Followed");
					$("#rcolumn").load("NotFollowed");
				});
			});

			/* Unfollow user */
			$(document).on("click", ".unfollowUser", function (event) {
				event.preventDefault();
				var id = $(this).parent().attr("id");
				$.post("Unfollow", { id: id }, function () {
					$("#content").load("Followed");
					$("#rcolumn").load("NotFollowed");
				});
			});

			/* Add tweet */
			$(document).on("click", "#addTweet", function (event) {
				event.preventDefault();
				var title = $("#tweetTitle").val().trim();
				var textBody = $("#tweetBody").text().trim();
				if (!title || !textBody) {
					alert("Cal omplir el títol i el cos del tweet.");
					return;
				}
				$.post("AddTweet", { title: title, textBody: textBody }, function () {
					$("#tweetTitle").val("");
					$("#tweetBody").text("");
					$("#iterator").load("Tweets");
				});
			});

			/* Like tweet */
			$(document).on("click", ".likeTweet", function (event) {
				event.preventDefault();
				var id = $(this).parent().attr("id");
				$.post("AddLike", { id: id }, function () {
					$("#iterator").load("Tweets");
				});
			});

			/* Delete tweet */
			$(document).on("click", ".delTweet", function (event) {
				event.preventDefault();
				var id = $(this).parent().attr("id");
				$.post("DelTweet", { id: id }, function () {
					$("#iterator").load("Tweets");
				});
			});
		};

		App.stack = function () {
			$("#stack").toggleClass("w3-show");
		};

		$(document).ready(function () {
			App.init();
		});
	</script>

</head>

<body>

	<!-- Begin Navigation -->
	<div class="w3-theme w3-top" id="navigation"> </div>
	<!-- End Navigation -->

	<!-- Begin Content -->
	<div class="w3-row-padding" style="margin-top: 50px;margin-bottom: 75px">

		<!-- Left Column -->
		<div class="w3-container w3-col m3 w3-hide-small">
			<div id="lcolumn"> </div>
		</div>
		<!-- Middle Column -->
		<div class="w3-container w3-col m6">
			<div id="content"> </div>
		</div>
		<!-- Right Column -->
		<div class="w3-container w3-col m3 w3-hide-small">
			<div id="rcolumn"> </div>
		</div>

	</div>
	<!-- End Content -->

	<!-- Footer -->
	<footer class="w3-container w3-theme w3-bottom">
		<p>Pompeu Fabra University @2026</p>
	</footer>

</body>

</html>
