<!DOCTYPE html>
<html lang=en>

<head>
	<meta charset="UTF-8">
	<link rel="icon" href="assets/upf.png">
	<title> U </title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
	<link rel="stylesheet" href="https://www.w3schools.com/lib/w3-theme-blue.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="css/style.css">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script>
		window.App = window.App || {};
		App.Errors = App.Errors || {};
	</script>
	<script src="js/LoginValidation.js"></script>
	<script src="js/RegisterValidation.js"></script>

	<script>
		App.init = function () {
			$.ajaxSetup({ cache: false });
			$('#navigation').load("Menu");
			$('#content').load("Content");
			$('#lcolumn').load("Profile");
			$('#rcolumn').load("NotFollowed");
			App.bindEvents();
		};

		App.bindEvents = function () {
			/* Menu navigation */
			$(document).on("click", ".menu", function (event) {
				event.preventDefault();
				$('#content').load($(this).attr('href'));
				App.stack();
			});

			/* Form submission via AJAX — uses .load() for non-file forms so scripts execute */
			$(document).on("submit", "form", function (event) {
				if (event.isDefaultPrevented() || !this.checkValidity()) return;
				event.preventDefault();
				var form = this;
				var url = $(form).attr('action');
				var hasFiles = $(form).find('input[type="file"]').length > 0;

				if (hasFiles) {
					/* Multipart form (e.g. Register with picture upload) */
					$.ajax({
						type: 'POST',
						url: url,
						data: new FormData(form),
						processData: false,
						contentType: false
					}).done(function (html) {
						$('#navigation').load("Menu");
						$('#lcolumn').load("Profile");
						$('#rcolumn').load("NotFollowed");
						/* $.parseHTML amb keepScripts=true + append() executa els scripts del fragment */
						$("#content").empty().append($.parseHTML(html, document, true));
					});
				} else {
					/* Regular form: serialitzem com a objecte (no string!) perquè .load() enviï POST */
					var formObj = {};
					$(form).serializeArray().forEach(function(f) { formObj[f.name] = f.value; });
					$("#content").load(url, formObj, function () {
						$('#navigation').load("Menu");
						$('#lcolumn').load("Profile");
						$('#rcolumn').load("NotFollowed");
					});
				}
			});

			/* Follow user (envia sol·licitud, l'usuari desapareix de suggeriments) */
			$(document).on("click", ".followUser", function (event) {
				event.preventDefault();
				var id = $(this).parent().attr("id");
				$.post("Follow", { id: id }, function () {
					$("#rcolumn").load("NotFollowed");
				});
			});

			/* Unfollow user */
			$(document).on("click", ".unfollowUser", function (event) {
				event.preventDefault();
				var id = $(this).parent().attr("id");
				$.post("Unfollow", { id: id }, function () {
					$("#content").load("Followed");
					$("#rcolumn").load("NotFollowed");
				});
			});

			/* Acceptar sol·licitud de seguiment */
			$(document).on("click", ".acceptRequest", function (event) {
				event.preventDefault();
				var from = $(this).parent().attr("id");
				$.post("AcceptFollow", { from: from }, function () {
					$("#content").load("Requests");
					$("#lcolumn").load("Profile");
				});
			});

			/* Rebutjar sol·licitud de seguiment */
			$(document).on("click", ".rejectRequest", function (event) {
				event.preventDefault();
				var from = $(this).parent().attr("id");
				$.post("RejectFollow", { from: from }, function () {
					$("#content").load("Requests");
				});
			});

			/* Add tweet */
			$(document).on("click", "#addTweet", function (event) {
				event.preventDefault();
				var title = $("#tweetTitle").val().trim();
				var textBody = $("#tweetBody").text().trim();
				if (!title || !textBody) {
					alert("Cal omplir el títol i el cos del tweet.");
					return;
				}
				var fileInput = $("#tweetPicture")[0];
				var formData = new FormData();
				formData.append("title", title);
				formData.append("textBody", textBody);
				if (fileInput && fileInput.files.length > 0) {
					formData.append("picture", fileInput.files[0]);
				}
				$.ajax({
					type: "POST",
					url: "AddTweet",
					data: formData,
					processData: false,
					contentType: false,
					success: function () {
						$("#tweetTitle").val("");
						$("#tweetBody").text("");
						if (fileInput) fileInput.value = "";
						$("#iterator").load("Tweets");
					}
				});
			});

			/* Like tweet */
			$(document).on("click", ".likeTweet", function (event) {
				event.preventDefault();
				var id = $(this).parent().attr("id");
				$.post("AddLike", { id: id }, function () {
					$("#iterator").load("Tweets");
				});
			});

			/* Unlike tweet (toggle) */
			$(document).on("click", ".unlikeTweet", function (event) {
				event.preventDefault();
				var id = $(this).parent().attr("id");
				$.post("DelLike", { id: id }, function () {
					$("#iterator").load("Tweets");
				});
			});

			/* Obrir/tancar secció de comentaris */
			$(document).on("click", ".toggleComments", function (event) {
				event.preventDefault();
				var tweetId = $(this).parent().attr("id");
				var section = $("#comments-" + tweetId);
				if (section.is(":hidden")) {
					section.show();
					if (section.find(".commentsList").is(":empty")) {
						section.find(".commentsList").load("Comments?id=" + tweetId);
					}
				} else {
					section.hide();
				}
			});

			/* Afegir comentari */
			$(document).on("click", ".addComment", function (event) {
				event.preventDefault();
				var section = $(this).closest('[id^="comments-"]');
				var tweetId = section.attr("id").replace("comments-", "");
				var title = section.find(".commentTitle").val().trim();
				var textBody = section.find(".commentBody").text().trim();
				if (!title || !textBody) {
					alert("Cal omplir el títol i el cos del comentari.");
					return;
				}
				$.post("AddTweet", { title: title, textBody: textBody, parentId: tweetId }, function () {
					section.find(".commentTitle").val("");
					section.find(".commentBody").text("");
					section.find(".commentsList").load("Comments?id=" + tweetId, function () {
						$("#" + tweetId + " .commentCount").text(section.find(".commentsList > div").length);
					});
				});
			});

			/* Mostrar/amagar formulari de resposta a un comentari */
			$(document).on("click", ".toggleReply", function (event) {
				event.preventDefault();
				$(this).siblings(".replyForm").toggle();
			});

			/* Enviar resposta a un comentari (nested: parentId = comment id) */
			$(document).on("click", ".addReply", function (event) {
				event.preventDefault();
				var replyForm = $(this).closest(".replyForm");
				var parentId = replyForm.attr("data-parent");
				var rootTweetId = replyForm.attr("data-root");
				var title = replyForm.find(".replyTitle").val().trim();
				var textBody = replyForm.find(".replyBody").text().trim();
				if (!title || !textBody) {
					alert("Cal omplir el títol i el cos de la resposta.");
					return;
				}
				$.post("AddTweet", { title: title, textBody: textBody, parentId: parentId }, function () {
					replyForm.find(".replyTitle").val("");
					replyForm.find(".replyBody").text("");
					replyForm.hide();
					var section = $("#comments-" + rootTweetId);
					section.find(".commentsList").load("Comments?id=" + rootTweetId, function () {
						$("#" + rootTweetId + " .commentCount").text(section.find(".commentsList > div").length);
					});
				});
			});

			/* Eliminar comentari propi (cascade: DB esborra fills automàticament) */
			$(document).on("click", ".delComment", function (event) {
				event.preventDefault();
				var commentId = $(this).parent().attr("id");
				var section = $(this).closest('[id^="comments-"]');
				var tweetId = section.attr("id").replace("comments-", "");
				$.post("DelTweet", { id: commentId }, function () {
					section.find(".commentsList").load("Comments?id=" + tweetId, function () {
						$("#" + tweetId + " .commentCount").text(section.find(".commentsList > div").length);
					});
				});
			});

			/* Delete tweet */
			$(document).on("click", ".delTweet", function (event) {
				event.preventDefault();
				var id = $(this).parent().attr("id");
				$.post("DelTweet", { id: id }, function () {
					$("#iterator").load("Tweets");
				});
			});

			/* Accessibility: toggle dark/light theme */
			$(document).on("click", "#toggleTheme", function () {
				$("body").toggleClass("dark-mode");
				var isDark = $("body").hasClass("dark-mode");
				localStorage.setItem("theme", isDark ? "dark" : "light");
				$(this).find("i").toggleClass("fa-moon-o fa-sun-o");
				var lang = localStorage.getItem("lang") || "ca";
				$(this).find("span")
					.attr("data-ca", isDark ? "Mode clar" : "Mode fosc")
					.attr("data-en", isDark ? "Light mode" : "Dark mode")
					.text(isDark ? (lang === "ca" ? "Mode clar" : "Light mode") : (lang === "ca" ? "Mode fosc" : "Dark mode"));
			});

			/* Accessibility: font size */
			$(document).on("click", "#fontSmall", function () {
				$("body").removeClass("font-small font-normal font-large").addClass("font-small");
				localStorage.setItem("fontSize", "small");
				$("#fontSmall, #fontNormal, #fontLarge").removeClass("w3-theme");
				$(this).addClass("w3-theme");
			});
			$(document).on("click", "#fontNormal", function () {
				$("body").removeClass("font-small font-normal font-large").addClass("font-normal");
				localStorage.setItem("fontSize", "normal");
				$("#fontSmall, #fontNormal, #fontLarge").removeClass("w3-theme");
				$(this).addClass("w3-theme");
			});
			$(document).on("click", "#fontLarge", function () {
				$("body").removeClass("font-small font-normal font-large").addClass("font-large");
				localStorage.setItem("fontSize", "large");
				$("#fontSmall, #fontNormal, #fontLarge").removeClass("w3-theme");
				$(this).addClass("w3-theme");
			});

			/* Accessibility: language */
			$(document).on("click", "#langCA", function () {
				localStorage.setItem("lang", "ca");
				App.currentLang = "ca";
				App.applyLang("ca");
				$("#langCA, #langEN").removeClass("w3-theme");
				$(this).addClass("w3-theme");
			});
			$(document).on("click", "#langEN", function () {
				localStorage.setItem("lang", "en");
				App.currentLang = "en";
				App.applyLang("en");
				$("#langCA, #langEN").removeClass("w3-theme");
				$(this).addClass("w3-theme");
			});
		};

		App.stack = function () {
			$("#stack").toggleClass("w3-show");
		};

		App.applyLang = function (lang) {
			$("[data-ca][data-en]").each(function () {
				$(this).text($(this).attr("data-" + lang));
			});
		};

		App.applyAccessibility = function () {
			var theme = localStorage.getItem("theme") || "light";
			var fontSize = localStorage.getItem("fontSize") || "normal";
			App.currentLang = localStorage.getItem("lang") || "ca";
			$("body").toggleClass("dark-mode", theme === "dark");
			$("body").removeClass("font-small font-normal font-large").addClass("font-" + fontSize);
		};

		$(document).ready(function () {
			App.init();
			App.applyAccessibility();
		});
	</script>

</head>

<body>

	<!-- Begin Navigation -->
	<div class="w3-theme w3-top" id="navigation"> </div>
	<!-- End Navigation -->

	<!-- Begin Content -->
	<div class="w3-row-padding" style="margin-top: 50px;margin-bottom: 75px">

		<!-- Left Column -->
		<div class="w3-container w3-col m3 w3-hide-small">
			<div id="lcolumn"> </div>
		</div>
		<!-- Middle Column -->
		<div class="w3-container w3-col m6">
			<div id="content"> </div>
		</div>
		<!-- Right Column -->
		<div class="w3-container w3-col m3 w3-hide-small">
			<div id="rcolumn"> </div>
		</div>

	</div>
	<!-- End Content -->

	<!-- Footer -->
	<footer class="w3-container w3-theme w3-bottom">
		<p>Pompeu Fabra University @2026</p>
	</footer>

</body>

</html>
